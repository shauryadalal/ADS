function SellForm({ item, goldRate, onSave, onCancel }) {
  const today = new Date().toISOString().split("T")[0];
  const [form, setForm] = useState({
    itemName: item ? item.name : "",
    itemId: item ? String(item.id) : "",
    itemKind: item ? item.kind : "",
    stockPrice: item ? Math.round(item.total) : 0,
    dateSold: today,
    finalPrice: item ? Math.round(item.total) : 0,
    cash: 0,
    bank: 0,
    goldWeight: 0,
    goldKarat: "18",
    goldValue: 0,
    oldJewelleryWeight: 0,
    oldJewelleryValue: 0,
    notes: "",
    type: "sale", // sale | return | purchase

// ── Cloudinary config ─────────────────────────────────────────
const CL_CLOUD  = "dlqxfxpsq";
const CL_PRESET = "ADS_AUTOMATION";

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CL_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`, {
    method: "POST", body: fd,
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Cloudinary ${res.status}: ${txt}`);
  }
  const data = await res.json();
  // Return a fixed-size optimised URL — f_auto,q_auto,w_1000
  return data.secure_url.replace("/upload/", "/upload/f_auto,q_auto,w_1000/");
}

// ── Dashboard ──────────────────────────────────────────────────
function Dashboard({ items, goldRate }) {
  const [open, setOpen] = useState(false);

  // ── Compute all metrics live ──────────────────────────────────
  const metrics = (() => {
    let sellTotal = 0, gold14 = 0, gold18 = 0, gold24 = 0;
    let polki = 0, diamond = 0, stone = 0, labour = 0, other = 0;
    let gold14g = 0, gold18g = 0, gold24g = 0;
    const byKind = { ring: 0, earring: 0, bracelet: 0, necklace: 0 };

    items.forEach(item => {
      const itemTotal = item.components.reduce((s, c) => s + livePrice(c, goldRate), 0);
      sellTotal += itemTotal;
      byKind[item.kind] = (byKind[item.kind] || 0) + itemTotal;

      item.components.forEach(c => {
        const p = livePrice(c, goldRate);
        if (c.category === "gold") {
          // Detect karat by rate proximity
          const r = c.rate || 0;
          const ratio = r / BASE_24K;
          if (ratio > 0.9) { gold24 += p; gold24g += (c.weight || 0); }
          else if (ratio > 0.7) { gold18 += p; gold18g += (c.weight || 0); }
          else { gold14 += p; gold14g += (c.weight || 0); }
        } else if (c.category === "polki")   polki    += p;
        else if (c.category === "diamond")   diamond  += p;
        else if (c.category === "stone")     stone    += p;
        else if (c.category === "labour")    labour   += p;
        else                                  other    += p;
      });
    });

    const totalGold = gold14 + gold18 + gold24;
    const costPrice = sellTotal * 0.80;
    const margin    = sellTotal - costPrice;
    const goldPct   = totalGold / sellTotal * 100;
    const diamondPct= diamond   / sellTotal * 100;
    const polkiPct  = polki     / sellTotal * 100;

    return { sellTotal, costPrice, margin, totalGold, gold14, gold18, gold24,
             gold14g, gold18g, gold24g, polki, diamond, stone, labour, other,
             goldPct, diamondPct, polkiPct, byKind, itemCount: items.length };
  })();

  const fmtCr = v => v >= 1e7
    ? `₹${(v/1e7).toFixed(2)} Cr`
    : v >= 1e5
    ? `₹${(v/1e5).toFixed(1)}L`
    : fmt(v);

  const Tile = ({ label, value, sub, color = "var(--c-text-h)", bg = "var(--c-bg-panel)", border = "var(--c-border)", wide }) => (
    React.createElement('div', { style: { background: bg, border: `1px solid ${border}`, borderRadius: 10, padding: "12px 14px", gridColumn: wide ? "span 2" : undefined },}
      , React.createElement('div', { style: { fontSize: 9, color, letterSpacing: 2, fontWeight: 700, textTransform: "uppercase", marginBottom: 5, opacity: 0.7 },}, label)
      , React.createElement('div', { style: { fontSize: 18, color, fontWeight: 800, fontVariantNumeric: "tabular-nums" },}, value)

    )

  return (
    React.createElement('div', { style: { borderBottom: "1px solid var(--c-border-dim)" },}
      /* Toggle button */
      , React.createElement('button', { onClick: () => setOpen(o => !o), style: {
        width: "100%", background: open ? "var(--c-bg-panel)" : "transparent",
        border: "none", borderBottom: open ? "1px solid var(--c-border-dim)" : "none",
        padding: "11px 16px", display: "flex", justifyContent: "space-between", alignItems: "center",
        cursor: "pointer", fontFamily: "inherit",
      },}

          , React.createElement('span', { style: { fontSize: 14, fontWeight: 800, color: "var(--c-text-h)", letterSpacing: 1 },}, "📊 Stock Dashboard"  )
          , React.createElement('span', { style: { fontSize: 11, color: "var(--c-text-dim)", fontWeight: 600 },}, metrics.itemCount, " pieces · "   , fmtCr(metrics.sellTotal), " total" )
        )

      )

  const [showSales, setShowSales] = useState(false);
  const [sales, setSales] = useState([]);
  const [showSellForm, setShowSellForm] = useState(false);
  const [sellItem, setSellItem] = useState(null);

  const [customers, setCustomers] = useState([]);
  const [showRepairs, setShowRepairs] = useState(false);
  const [repairs, setRepairs] = useState([]);
  const [showPurchases, setShowPurchases] = useState(false);
  const [purchases, setPurchases] = useState([]);
  const [showReports, setShowReports] = useState(false);
  const [activeForm, setActiveForm] = useState(null); // "customer"|"repair"|"purchase"
  const [editRecord, setEditRecord] = useState(null); // fn to call after unlock

  const isSavingRef = React.useRef(false);

  const BASE_KEYS = new Set(ITEMS.map(i => `${i.kind}::${i.id}`));
  const FB = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/jewellery";
  const FB_SALES = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/sales";
  const FB_CUSTOMERS = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/customers";
  const FB_REPAIRS = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/repairs";
  const FB_PURCHASES = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/purchases";

  // ── Firebase helpers ──────────────────────────────────────────
  const fbUrl = p => p ? `${FB}/${p}.json` : `${FB}.json`;
  async function fbGet(path) {
    const res = await fetch(fbUrl(path));
    if (res.status === 404) {
      const body = await res.text();
      // If body contains error info, it's a real error not just empty
      if (body && body.includes('error')) throw new Error(`GET 404: ${body.slice(0,120)}`);
      return null;
    }
    if (!res.ok) throw new Error(`Firebase GET failed: ${res.status}`);
    return res.json();
  }
  async function fbSet(path, value) {
    const res = await fetch(fbUrl(path), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`SET ${res.status} @ ${fbUrl(path)}: ${body.slice(0,120)}`);
    }
    return res.json();
  }
  async function fbPatch(path, value) {
    const res = await fetch(fbUrl(path), {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value),
    });
    if (!res.ok) throw new Error(`Firebase PATCH failed: ${res.status}`);
    return res.json();
  }
  async function fbDelete(path) {
    await fetch(fbUrl(path), { method: "DELETE" });

  // ── Reconcile: always apply latest components from code for base items ──
  // This means fixing stale Firebase data on every load — no manual SYNC needed
  function reconcile(stored) {
    const baseMap = new Map(ITEMS.map(i => [i.kind + "::" + i.id, i]));
    const storedKeys = new Set(stored.map(i => i.kind + "::" + i.id));
    const reconciled = stored
      // Drop items that were removed from base
      .filter(i => BASE_KEYS.has(i.kind + "::" + i.id) || !baseMap.has(i.kind + "::" + i.id))
      .map(i => {
        const base = baseMap.get(i.kind + "::" + i.id);
        if (!base) return i; // user-added item — keep entirely
        // Keep stored version (preserves all user edits to components/rates/prices)
        // Only fall back to base if stored item is missing components entirely
        if (!i.components || i.components.length === 0) return base;
        return i;
      });
    // Add new base items not yet in Firebase
    const newItems = ITEMS.filter(i => !storedKeys.has(i.kind + "::" + i.id));
    return [...reconciled, ...newItems];
  }

  // ── One-time migration: rename old vendor/alphanumeric IDs → clean sequences ──
  const ITEM_ID_MAP = {
    // Necklaces
    "necklace::BNL2254":"N54","necklace::BNL2380":"N55","necklace::JNK3302":"N56",
    "necklace::BNL2372":"N57","necklace::BNL2367":"N58","necklace::JNL3341":"N59",
    "necklace::KNL3152":"N60","necklace::ANK6310":"N61","necklace::TNL1117":"N62",
    "necklace::JPD3306":"N63","necklace::JPD3301":"N64","necklace::TPD1119":"N65",
    "necklace::TPD1121":"N66","necklace::TPD1122":"N67","necklace::KPD3167":"N68",
    "necklace::CVD-74":"N69","necklace::CVD-44":"N70",
    // Rings
    "ring::38a":32,"ring::38b":33,"ring::38c":34,"ring::38d":35,"ring::38e":36,
    "ring::38f":37,"ring::38h":38,"ring::38i":39,"ring::38j":40,"ring::38k":41,
    "ring::38l":42,"ring::38m":43,"ring::38n":44,
    // Earrings
    "earring::TER1103":57,"earring::JNE3341":58,"earring::KNE3152":59,
    "earring::AOER6324":60,"earring::TNE1117":61,"earring::CVD-76":62,
    // Bracelets
    "bracelet::TBR1105":95,"bracelet::ABR6307":96,"bracelet::CVD-49":97,

    "bracelet::CVD-24":101,"bracelet::CVD-87":102,
  };
  async function migrateItemIds(data) {
    if (!data || !data.items) return data;
    let changed = false;
    const migrated = data.items.map(item => {
      const newId = ITEM_ID_MAP[item.kind + "::" + item.id];
      if (newId !== undefined) { changed = true; return { ...item, id: newId }; }
      return item;
    });
    if (changed) { await fbSet("items", migrated); return { ...data, items: migrated }; }
    return data;
  }

  // ── Apply a Firebase snapshot to local state ──────────────────
  function applySnapshot(data) {
    if (!data) return;
    if (data.items) setItems(reconcile(data.items));
    // Only update gold rate from remote if not mid-save (avoids poll overwriting local edits)
    if (data.goldRate && !isSavingRef.current) setGoldRate(parseFloat(data.goldRate));
    setLastSync(new Date());

  // ── Mount: load once then open live stream ────────────────────
  useEffect(() => {
    // Initial load
    setSyncing(true);
    fbGet("").then(async data => {
      if (!data) {
        // Empty database — push default data now so all devices get it
        await fbSet("items", ITEMS);
        await fbSet("goldRate", BASE_24K);
        setItems(ITEMS);
        setGoldRate(BASE_24K);
      } else {
        let current = await migrateItemIds(data);
        // Push base items that are new in code (not yet in Firebase, not deliberately deleted)
        const storedKeys = new Set((current.items || []).map(i => i.kind + "::" + i.id));
        const deletedIds = new Set(current.deletedBaseIds || []);
        const missing = ITEMS.filter(i => !storedKeys.has(i.kind + "::" + i.id) && !deletedIds.has(i.kind + "::" + i.id));
        if (missing.length > 0) {
          const withMissing = [...(current.items || []), ...missing];
          await fbSet("items", withMissing);
          current = { ...current, items: withMissing };
        }
        applySnapshot(current);
        await loadPhotos();
      }
      await loadSales();
      await loadCustomers();
      await loadRepairs();
      await loadPurchases();
      setSyncing(false);
      setFbError(null);
    }).catch(err => {
      setSyncing(false);
      setFbError("DB error: " + err.message);
    });

  }, []);

  const lastSnapshotRef = React.useRef(null);

    const id = setInterval(async () => {
      if (isSavingRef.current) return;
      try {
        const data = await fbGet("");
        if (!data || !data.items) return;
        // Only update if data has actually changed (compare JSON)
        const snapshot = JSON.stringify({ items: data.items, goldRate: data.goldRate });
        if (snapshot !== lastSnapshotRef.current) {
          lastSnapshotRef.current = snapshot;
          applySnapshot(data);
        }

    }, 5000);
    return () => clearInterval(id);
  }, []);

  async function migrateFromStorage() {
    setMigrateMsg("Reading old data…");
    let migratedItems = false, migratedRate = false, migratedPhotos = 0;
    try {
      // Migrate items
      if (!window.storage) { setMigrateMsg("Old storage not available in this environment"); setMigrating(false); return; }
      const r = await window.storage.get("jp_items", true);
      if (r && r.value) {
        const stored = JSON.parse(r.value);
        await fbSet("items", stored);
        setItems(reconcile(stored));
        migratedItems = true;
      }
      // Migrate gold rate
      const rr = await window.storage.get("jp_goldRate", true);
      if (rr && rr.value) {
        const rate = parseFloat(rr.value);
        await fbSet("goldRate", rate);
        setGoldRate(rate);
        migratedRate = true;
      }
      // Migrate photos
      setMigrateMsg("Migrating photos…");
      try {
        const pi = await window.storage.get("jp_photo_index", true);
        if (pi && pi.value) {
          const keys = JSON.parse(pi.value);
          for (const k of keys) {
            try {
              const pr = await window.storage.get(`jp_photo_${k}`, true);
              if (pr && pr.value) {
                const fbKey = k.replace("::", "__");
                await fbSet(`photos/${fbKey}`, pr.value);
                migratedPhotos++;
                setMigrateMsg(`Migrating photos… ${migratedPhotos} done`);
              }
            } catch (e18) {}
          }
          await loadPhotos();
        }
      } catch (e19) {}
      const parts = [];
      if (migratedItems) parts.push("inventory");
      if (migratedRate)  parts.push("gold rate");
      if (migratedPhotos > 0) parts.push(`${migratedPhotos} photo${migratedPhotos > 1 ? "s" : ""}`);
      setMigrateMsg(parts.length > 0 ? `✓ Migrated: ${parts.join(", ")}` : "Nothing found in old storage");
    } catch(e) {
      setMigrateMsg(`Migration failed: ${e.message}`);
    }
    setMigrating(false);
  }

  const KIND_ORDER = { ring: 0, earring: 1, bracelet: 2, necklace: 3 };
  const filtered = items.filter(item => {
    if (filter !== "all" && item.kind !== filter) return false;
    if (!search) return true;
    const q = search.toLowerCase();
    return item.name.toLowerCase().includes(q) || (item.tags || []).some(t => t.toLowerCase().includes(q));
  }).sort((a, b) => {
    const kd = KIND_ORDER[a.kind] - KIND_ORDER[b.kind];
    if (kd !== 0) return kd;

    if (aNum && bNum) return a.id - b.id;

    if (bNum) return 1;
    return String(a.id).localeCompare(String(b.id), undefined, { numeric: true });

  // ── CSV Export ────────────────────────────────────────────────
  function exportCSV(data, filename, columns) {
    const header = columns.map(c => c.label).join(",");
    const rows = data.map(row =>
      columns.map(col => {
        const val = col.fn ? col.fn(row) : (row[col.key] != null ? row[col.key] : "");
        const str = String(val).replace(/"/g, '""');
        return str.includes(",") || str.includes('"') || str.includes("\n") ? `"${str}"` : str;
      }).join(",")
    );
    const csv = [header, ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }
