function Reports({ sales, purchases, repairs, onClose, onExportSales, onExportPurchases }) {
  const [period, setPeriod] = useState("month");
  const [offset, setOffset] = useState(0); // 0 = current, 1 = previous, etc.

  const now = new Date();
  function getPeriodBounds() {
    const d = new Date(now);
    if (period === "month") {
      d.setMonth(d.getMonth() - offset);
      return { start: new Date(d.getFullYear(), d.getMonth(), 1), end: new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59), label: d.toLocaleString("en-IN", { month: "long", year: "numeric" }) };
    } else if (period === "quarter") {
      d.setMonth(d.getMonth() - offset * 3);
      const q = Math.floor(d.getMonth() / 3);
      return { start: new Date(d.getFullYear(), q * 3, 1), end: new Date(d.getFullYear(), q * 3 + 3, 0, 23, 59, 59), label: `Q${q+1} ${d.getFullYear()}` };
    } else {
      const yr = d.getFullYear() - offset;
      return { start: new Date(yr, 0, 1), end: new Date(yr, 11, 31, 23, 59, 59), label: String(yr) };
    }
  }
  const { start, end, label } = getPeriodBounds();
  const inPeriod = dateStr => { if (!dateStr) return false; const d = new Date(dateStr); return d >= start && d <= end; };

  const periodSales = sales.filter(s => inPeriod(s.createdAt || s.dateSold));

// ── Cloudinary config ─────────────────────────────────────────
const CL_CLOUD  = "dlqxfxpsq";
const CL_PRESET = "ADS_AUTOMATION";

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CL_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`, {
    method: "POST", body: fd,
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Cloudinary ${res.status}: ${txt}`);
  }
  const data = await res.json();
  // Return a fixed-size optimised URL — f_auto,q_auto,w_1000
  return data.secure_url.replace("/upload/", "/upload/f_auto,q_auto,w_1000/");
}

function PhotoBlock({ src, name }) {
  if (!src) return null;
  return (
    React.createElement('div', { style: { marginBottom: 14, borderRadius: 12, overflow: "hidden", border: "1px solid #2a1f35" },}
      , React.createElement('img', { src: src, alt: name, style: { width: "100%", maxHeight: 300, objectFit: "cover", display: "block" },} )
    )

// ── Dashboard ──────────────────────────────────────────────────
function Dashboard({ items, goldRate }) {
  const [open, setOpen] = useState(false);

  // ── Compute all metrics live ──────────────────────────────────
  const metrics = (() => {
    let sellTotal = 0, gold14 = 0, gold18 = 0, gold24 = 0;
    let polki = 0, diamond = 0, stone = 0, labour = 0, other = 0;
    let gold14g = 0, gold18g = 0, gold24g = 0;
    const byKind = { ring: 0, earring: 0, bracelet: 0, necklace: 0 };

    items.forEach(item => {
      const itemTotal = item.components.reduce((s, c) => s + livePrice(c, goldRate), 0);
      sellTotal += itemTotal;
      byKind[item.kind] = (byKind[item.kind] || 0) + itemTotal;

      item.components.forEach(c => {
        const p = livePrice(c, goldRate);
        if (c.category === "gold") {
          // Detect karat by rate proximity
          const r = c.rate || 0;
          const ratio = r / BASE_24K;
          if (ratio > 0.9) { gold24 += p; gold24g += (c.weight || 0); }
          else if (ratio > 0.7) { gold18 += p; gold18g += (c.weight || 0); }
          else { gold14 += p; gold14g += (c.weight || 0); }
        } else if (c.category === "polki")   polki    += p;
        else if (c.category === "diamond")   diamond  += p;
        else if (c.category === "stone")     stone    += p;
        else if (c.category === "labour")    labour   += p;
        else                                  other    += p;
      });
    });

    const totalGold = gold14 + gold18 + gold24;
    const costPrice = sellTotal * 0.80;
    const margin    = sellTotal - costPrice;
    const goldPct   = totalGold / sellTotal * 100;
    const diamondPct= diamond   / sellTotal * 100;
    const polkiPct  = polki     / sellTotal * 100;

    return { sellTotal, costPrice, margin, totalGold, gold14, gold18, gold24,
             gold14g, gold18g, gold24g, polki, diamond, stone, labour, other,
             goldPct, diamondPct, polkiPct, byKind, itemCount: items.length };
  })();

  const fmtCr = v => v >= 1e7
    ? `₹${(v/1e7).toFixed(2)} Cr`
    : v >= 1e5
    ? `₹${(v/1e5).toFixed(1)}L`
    : fmt(v);

  const Tile = ({ label, value, sub, color = "#c4a0e0", bg = "#110e1a", border = "#2a1f35", wide }) => (
    React.createElement('div', { style: { background: bg, border: `1px solid ${border}`, borderRadius: 10, padding: "12px 14px", gridColumn: wide ? "span 2" : undefined },}
      , React.createElement('div', { style: { fontSize: 9, color, letterSpacing: 2, fontWeight: 700, textTransform: "uppercase", marginBottom: 5, opacity: 0.7 },}, label)
      , React.createElement('div', { style: { fontSize: 18, color, fontWeight: 800, fontVariantNumeric: "tabular-nums" },}, value)
      , sub && React.createElement('div', { style: { fontSize: 11, color, opacity: 0.55, marginTop: 3, fontWeight: 600 },}, sub)
    )
  );

  const Bar = ({ pct, color }) => (
    React.createElement('div', { style: { height: 4, background: "#1e1828", borderRadius: 2, overflow: "hidden", marginTop: 6 },}
      , React.createElement('div', { style: { height: "100%", width: `${Math.min(pct, 100)}%`, background: color, borderRadius: 2, transition: "width 0.4s" },} )
    )
  );

  return (
    React.createElement('div', { style: { borderBottom: "1px solid #130f18" },}
      /* Toggle button */
      , React.createElement('button', { onClick: () => setOpen(o => !o), style: {

  const [search, setSearch] = useState("");
  const [searchInput, setSearchInput] = useState("");

  const [selected, setSelected] = useState(null);

  const [syncing, setSyncing] = useState(true);
  const [lastSync, setLastSync] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [resetConfirm, setResetConfirm] = useState(false);
  const [viewMode, setViewMode] = useState("lookbook");
  const [photos, setPhotos] = useState({});
  const [fbError, setFbError] = useState(null);
  const [unlocked, setUnlocked] = useState(false);
  const [showPwModal, setShowPwModal] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [pendingAction, setPendingAction] = useState(null);
  const [showSales, setShowSales] = useState(false);
  const [sales, setSales] = useState([]);
  const [showSellForm, setShowSellForm] = useState(false);
  const [sellItem, setSellItem] = useState(null);
  const [showCustomers, setShowCustomers] = useState(false);
  const [customers, setCustomers] = useState([]);
  const [showRepairs, setShowRepairs] = useState(false);
  const [repairs, setRepairs] = useState([]);
  const [showPurchases, setShowPurchases] = useState(false);
  const [purchases, setPurchases] = useState([]);
  const [showReports, setShowReports] = useState(false);
  const [activeForm, setActiveForm] = useState(null); // "customer"|"repair"|"purchase"
  const [editRecord, setEditRecord] = useState(null); // fn to call after unlock

  const isSavingRef = React.useRef(false);

  const BASE_KEYS = new Set(ITEMS.map(i => `${i.kind}::${i.id}`));
  const FB = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/jewellery";
  const FB_SALES = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/sales";
  const FB_CUSTOMERS = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/customers";
  const FB_REPAIRS = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/repairs";
  const FB_PURCHASES = "https://ads-automation-d9560-default-rtdb.asia-southeast1.firebasedatabase.app/purchases";

  // ── Firebase helpers ──────────────────────────────────────────
  const fbUrl = p => p ? `${FB}/${p}.json` : `${FB}.json`;
  async function fbGet(path) {
    const res = await fetch(fbUrl(path));
    if (res.status === 404) {
      const body = await res.text();
      // If body contains error info, it's a real error not just empty
      if (body && body.includes('error')) throw new Error(`GET 404: ${body.slice(0,120)}`);
      return null;
    }
    if (!res.ok) throw new Error(`Firebase GET failed: ${res.status}`);
    return res.json();
  }
  async function fbSet(path, value) {
    const res = await fetch(fbUrl(path), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`SET ${res.status} @ ${fbUrl(path)}: ${body.slice(0,120)}`);
    }
    return res.json();
  }
  async function fbPatch(path, value) {
    const res = await fetch(fbUrl(path), {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value),
    });
    if (!res.ok) throw new Error(`Firebase PATCH failed: ${res.status}`);
    return res.json();
  }
  async function fbDelete(path) {
    await fetch(fbUrl(path), { method: "DELETE" });
  }

  // ── Sales Firebase helpers ───────────────────────────────────
  const fbSalesUrl = p => p ? `${FB_SALES}/${p}.json` : `${FB_SALES}.json`;
  async function loadSales() {
    try {
      const res = await fetch(fbSalesUrl(""));
      if (res.ok) { const d = await res.json(); if (d) setSales(Object.values(d)); }
    } catch (e2) {}
  }
  async function saveSale(sale) {
    const id = "sale_" + Date.now();
    const now = new Date().toISOString();
    const res = await fetch(fbSalesUrl(id), {
      method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ...sale, id, createdAt: now }),
    });
    if (!res.ok) throw new Error(`Sale save failed: ${res.status}`);
    setSales(prev => [...prev, { ...sale, id }]);
    // Remove from inventory
    if (sale.itemId && sale.itemKind) {
      const next = items.filter(i => !(String(i.id) === String(sale.itemId) && i.kind === sale.itemKind));
      setItems(next);
      isSavingRef.current = true;
      await fbSet("items", next);
      isSavingRef.current = false;
    }
  }

  // ── Customer helpers ────────────────────────────────────────
  const fbCustUrl = p => p ? `${FB_CUSTOMERS}/${p}.json` : `${FB_CUSTOMERS}.json`;
  async function loadCustomers() {
    try { const r = await fetch(fbCustUrl("")); if (r.ok) { const d = await r.json(); if (d) setCustomers(Object.values(d).sort((a,b) => (a.name||"").localeCompare(b.name||""))); } } catch (e3) {}
  }
  async function saveCustomer(cust) {
    const id = cust.id || ("cust_" + Date.now());
    const now = new Date().toISOString();
    const rec = { ...cust, id, updatedAt: now, createdAt: cust.createdAt || now };
    await fetch(fbCustUrl(id), { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(rec) });
    setCustomers(prev => { const next = prev.filter(c => c.id !== id); return [...next, rec].sort((a,b) => (a.name||"").localeCompare(b.name||"")); });
  }
  async function deleteCustomer(id) {
    await fetch(fbCustUrl(id), { method: "DELETE" });
    setCustomers(prev => prev.filter(c => c.id !== id));

      .map(i => {

  async function migrateFromStorage() {
    setMigrateMsg("Reading old data…");
    let migratedItems = false, migratedRate = false, migratedPhotos = 0;
    try {
      // Migrate items
      if (!window.storage) { setMigrateMsg("Old storage not available in this environment"); setMigrating(false); return; }
      const r = await window.storage.get("jp_items", true);
      if (r && r.value) {
        const stored = JSON.parse(r.value);
        await fbSet("items", stored);
        setItems(reconcile(stored));
        migratedItems = true;
      }
      // Migrate gold rate
      const rr = await window.storage.get("jp_goldRate", true);
      if (rr && rr.value) {
        const rate = parseFloat(rr.value);
        await fbSet("goldRate", rate);
        setGoldRate(rate);
        migratedRate = true;
      }
      // Migrate photos
      setMigrateMsg("Migrating photos…");
      try {
        const pi = await window.storage.get("jp_photo_index", true);
        if (pi && pi.value) {
          const keys = JSON.parse(pi.value);
          for (const k of keys) {
            try {
              const pr = await window.storage.get(`jp_photo_${k}`, true);
              if (pr && pr.value) {
                const fbKey = k.replace("::", "__");
                await fbSet(`photos/${fbKey}`, pr.value);
                migratedPhotos++;
                setMigrateMsg(`Migrating photos… ${migratedPhotos} done`);
              }
            } catch (e18) {}
          }
          await loadPhotos();
        }
      } catch (e19) {}
      const parts = [];
      if (migratedItems) parts.push("inventory");
      if (migratedRate)  parts.push("gold rate");
      if (migratedPhotos > 0) parts.push(`${migratedPhotos} photo${migratedPhotos > 1 ? "s" : ""}`);
      setMigrateMsg(parts.length > 0 ? `✓ Migrated: ${parts.join(", ")}` : "Nothing found in old storage");
    } catch(e) {
      setMigrateMsg(`Migration failed: ${e.message}`);
    }
    setMigrating(false);
  }

      columns.map(col => {

        return str.includes(",") || str.includes('"') || str.includes("\n") ? `"${str}"` : str;
      }).join(",")
    );
    const csv = [header, ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

                  )

        React.createElement('div', { style: { flex: 1, overflowY: "auto", overflowX: "hidden", background: "#09080a", padding: "10px" },}

            , filtered.map((item) => {
